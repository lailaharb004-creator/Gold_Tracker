<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Gold Track</title>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand" href="#">
                Gold Track
            </a>

            <!-- Toggle (for mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links + Buttons -->
            <div class="collapse navbar-collapse justify-content-between" id="navbarNav">

                <!-- Links -->
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">News </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">My Assets</a>
                    </li>
                </ul>

                <!-- Buttons -->
                <div>
                    <button class="btn btn-outline-primary me-2">Sign Up</button>
                    <button class="btn btn-primary">Login</button>
                </div>

            </div>
        </div>
    </nav>
</header>

<div class="ticker-bar bg-dark text-light py-1">
  <div class="container-fluid overflow-hidden">
    <div class="ticker-content d-flex" id="ticker">
      
      <div class="ticker-item mx-4">
        <span class="ticker-label">XAU/USD</span>
        <span class="ticker-value" id="tick-usd">--</span>
      </div>

      <div class="ticker-item mx-4">
        <span class="ticker-label">24K/غرام</span>
        <span class="ticker-value" id="tick-24k">--</span>
      </div>

      <div class="ticker-item mx-4">
        <span class="ticker-label">21K/غرام</span>
        <span class="ticker-value" id="tick-21k">--</span>
      </div>

      <div class="ticker-item mx-4">
        <span class="ticker-label">18K/غرام</span>
        <span class="ticker-value" id="tick-18k">--</span>
      </div>

    </div>
  </div>
</div>



<section class="">
  <!-- Footer -->
  <footer class="text-center text-white" style="background-color: #0a4275;">
    <!-- Grid container -->
    <div class="container p-4 pb-0">
      <!-- Section: CTA -->
      <section class="">
        <p class="d-flex justify-content-center align-items-center">
          <span class="me-3">Register for free</span>
          <button data-mdb-ripple-init type="button" class="btn btn-outline-light btn-rounded">
            Sign up!
          </button>
        </p>
      </section>
      <!-- Section: CTA -->
    </div>
    <!-- Grid container -->

    <!-- Copyright -->
    <div class="text-center p-3" style="background-color: rgb(0, 0, 0, 0.2);">
    <p>GoldTrack &copy; 2026</p>     
    <!-- Copyright -->
  </footer>
  <!-- Footer -->
</section>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
